name: navidrome
summary: Navidrome
description: Navidrome music streaming server, Subsonic/OpenSubsonic API compatible

apps:
  navidrome:
    user: navidrome
    command: bin/service.navidrome.sh
    daemon: simple
    restart-condition: always
    start-timeout: 600s
    restart-delay: 10s

  backend:
    user: navidrome
    command: bin/service.backend.sh
    daemon: simple
    restart-condition: always
    start-timeout: 600s
    restart-delay: 10s

  nginx:
    user: navidrome
    command: bin/service.nginx.sh
    daemon: simple
    restart-condition: always
    start-timeout: 600s
    restart-delay: 10s

  cli:
    command: bin/cli

  storage-change:
    command: bin/cli storage-change

  access-change:
    command: bin/cli access-change

  backup-pre-stop:
    command: bin/cli backup-pre-stop

  restore-pre-start:
    command: bin/cli restore-pre-start

  restore-post-start:
    command: bin/cli restore-post-start
