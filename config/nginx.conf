pid {{ .DataDir }}/nginx.pid;
daemon off;
worker_processes auto;

error_log syslog:server=unix:/dev/log warn;

events {
    worker_connections 1024;
}

http {
    access_log syslog:server=unix:/dev/log;
    include {{ .AppDir }}/nginx/etc/nginx/mime.types;

    client_body_temp_path {{ .DataDir }}/nginx/client_body_temp;
    proxy_temp_path {{ .DataDir }}/nginx/proxy_temp;
    fastcgi_temp_path {{ .DataDir }}/nginx/fastcgi_temp;
    uwsgi_temp_path {{ .DataDir }}/nginx/uwsgi_temp;
    scgi_temp_path {{ .DataDir }}/nginx/scgi_temp;

    client_max_body_size 0;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    upstream navidrome {
        server unix:{{ .Socket }};
    }

    server {
        listen unix:{{ .CommonDir }}/web.socket;

        set_real_ip_from unix:;
        server_name localhost;

        include {{ .DataDir }}/config/authelia-location.conf;
        include {{ .DataDir }}/config/authelia-location-basic.conf;

        location = /app/sw.js {
            default_type application/javascript;
            add_header Cache-Control "no-store";
            return 200 "self.addEventListener('install',function(){self.skipWaiting()});self.addEventListener('activate',function(e){e.waitUntil((async function(){await self.registration.unregister();var cs=await self.clients.matchAll();for(var i=0;i<cs.length;i++){cs[i].navigate(cs[i].url)}})())});";
        }

        location /rest/ {
            include {{ .DataDir }}/config/proxy.conf;
            include {{ .DataDir }}/config/authelia-authrequest-basic.conf;

            proxy_pass http://navidrome;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_buffering off;
            proxy_redirect off;
        }

        location / {
            include {{ .DataDir }}/config/proxy.conf;
            include {{ .DataDir }}/config/authelia-authrequest.conf;

            proxy_pass http://navidrome;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_buffering off;
            proxy_redirect off;
        }
    }
}
